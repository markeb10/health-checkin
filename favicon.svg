<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFE066;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#FFE066;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Outer glow -->
  <circle cx="64" cy="64" r="62" fill="url(#glow)"/>
  <!-- Sun rays -->
  <g stroke="#F59E0B" stroke-width="4" stroke-linecap="round">
    <line x1="64" y1="8" x2="64" y2="22"/>
    <line x1="64" y1="106" x2="64" y2="120"/>
    <line x1="8" y1="64" x2="22" y2="64"/>
    <line x1="106" y1="64" x2="120" y2="64"/>
    <line x1="24" y1="24" x2="34" y2="34"/>
    <line x1="94" y1="94" x2="104" y2="104"/>
    <line x1="104" y1="24" x2="94" y2="34"/>
    <line x1="34" y1="94" x2="24" y2="104"/>
  </g>
  <!-- Sun body -->
  <circle cx="64" cy="64" r="30" fill="#FBBF24"/>
  <circle cx="64" cy="64" r="30" fill="url(#sunGrad)"/>
  <defs>
    <radialGradient id="sunGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#FDE68A"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </radialGradient>
  </defs>
  <!-- Subtle face - friendly smile -->
  <circle cx="54" cy="58" r="3" fill="#D97706" opacity="0.6"/>
  <circle cx="74" cy="58" r="3" fill="#D97706" opacity="0.6"/>
  <path d="M52 72 Q64 82 76 72" stroke="#D97706" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
</svg>
